<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalChat — Réseau Local</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1a1a1a;
    --bg2:       #222222;
    --bg3:       #2a2a2a;
    --panel:     #242424;
    --border:    #333333;
    --red:       #c0392b;
    --red-bright:#e74c3c;
    --red-dim:   #7b241c;
    --red-glow:  rgba(192,57,43,.25);
    --text:      #e8e8e8;
    --text-muted:#888;
    --text-dim:  #555;
    --radius:    10px;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ══════════════════════════════════════════
     LOGIN SCREEN
  ══════════════════════════════════════════ */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    transition: opacity .4s ease;
  }
  #login-screen.hidden { opacity: 0; pointer-events: none; }

  .login-box {
    width: 380px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--red-dim), var(--red), var(--red-dim));
  }
  .logo-mark {
    width: 64px; height: 64px;
    background: var(--red);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
    box-shadow: 0 0 30px var(--red-glow);
  }
  .login-box h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
  .login-box p  { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; font-family: var(--mono); }
  .input-group { position: relative; margin-bottom: 16px; }
  .input-group input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--sans);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-group input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow);
  }
  .input-group input::placeholder { color: var(--text-dim); }
  .btn-primary {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    letter-spacing: .5px;
    transition: background .2s, transform .1s, box-shadow .2s;
  }
  .btn-primary:hover  { background: var(--red-bright); box-shadow: 0 4px 20px var(--red-glow); }
  .btn-primary:active { transform: scale(.98); }
  .login-error { color: var(--red-bright); font-size: 13px; margin-top: 10px; min-height: 18px; }
  .network-badge {
    margin-top: 24px;
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-family: var(--mono);
    color: var(--text-muted);
    background: var(--bg3); border-radius: 20px; padding: 5px 12px;
  }
  .dot-green { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; }

  /* ══════════════════════════════════════════
     APP LAYOUT
  ══════════════════════════════════════════ */
  #app { display: none; height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  /* ── TOPBAR ── */
  .topbar {
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px;
    gap: 14px; flex-shrink: 0;
    position: relative;
  }
  .topbar::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
  }
  .topbar-logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: var(--red-bright); }
  .topbar-logo span { color: var(--text-muted); font-weight: 400; font-size: 13px; font-family: var(--mono); margin-left: 6px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .my-pseudo { font-size: 13px; font-family: var(--mono); color: var(--text-muted); }
  .my-pseudo strong { color: var(--text); }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border-radius: 20px; padding: 4px 10px;
    font-size: 11px; font-family: var(--mono); color: var(--text-muted);
  }
  /* Toggle Switch */
  .toggle-container { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: var(--mono); color: var(--text-muted); cursor: pointer; }
  .switch {
    position: relative; display: inline-block; width: 34px; height: 18px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--bg3); transition: .4s; border-radius: 18px; border: 1px solid var(--border);
  }
  .slider:before {
    position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px;
    background-color: var(--text-muted); transition: .4s; border-radius: 50%;
  }
  input:checked + .slider { background-color: var(--red-dim); border-color: var(--red); }
  input:checked + .slider:before { transform: translateX(16px); background-color: white; }

  .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── MAIN ── */
  .main-area {
    flex: 1; display: flex; overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px 16px 8px; }
  .sidebar-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .room-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    font-size: 14px; font-weight: 600;
    color: var(--text-muted);
  }
  .room-item:hover    { background: var(--bg3); color: var(--text); }
  .room-item.active   { background: var(--red-dim); color: var(--text); }
  .room-item .room-icon { font-size: 16px; }

  .divider { height: 1px; background: var(--border); margin: 8px 16px; }

  .users-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
  .user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    font-size: 13px; color: var(--text-muted);
  }
  .user-item:hover  { background: var(--bg3); color: var(--text); }
  .user-item.active { background: var(--red-dim); color: var(--text); }
  .user-item.me     { cursor: default; }
  .user-item.me:hover { background: transparent; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    flex-shrink: 0; text-transform: uppercase;
  }
  .avatar.lg { width: 36px; height: 36px; font-size: 14px; }
  .unread-badge {
    margin-left: auto;
    background: var(--red);
    color: #fff; font-size: 10px; font-family: var(--mono);
    font-weight: 700; border-radius: 10px;
    padding: 1px 7px; min-width: 20px; text-align: center;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg);
  }
  .chat-header {
    height: 52px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
    background: var(--panel);
  }
  .chat-header-name { font-weight: 700; font-size: 15px; }
  .chat-header-sub  { font-size: 12px; font-family: var(--mono); color: var(--text-muted); margin-left: 4px; }

  .messages-container {
    flex: 1; overflow-y: auto;
    padding: 20px;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* ── MESSAGES ── */
  .msg-group { display: flex; flex-direction: column; margin-bottom: 12px; }
  .msg-meta {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px; padding-left: 44px;
  }
  .msg-sender { font-size: 13px; font-weight: 700; }
  .msg-time   { font-size: 11px; font-family: var(--mono); color: var(--text-dim); }

  .msg-row {
    display: flex; align-items: flex-end; gap: 10px;
  }
  .msg-row .avatar-wrap { width: 34px; flex-shrink: 0; }
  .msg-row .avatar-wrap .avatar { width: 34px; height: 34px; font-size: 13px; }

  .bubble {
    max-width: 65%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    padding: 10px 14px;
    font-size: 14px; line-height: 1.55;
    word-break: break-word;
  }
  .bubble.mine {
    background: var(--red-dim);
    border-color: var(--red);
    border-radius: 14px 14px 4px 14px;
  }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-row.mine .msg-meta { padding-left: 0; padding-right: 44px; justify-content: flex-end; }

  /* file bubble */
  .file-bubble {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: inherit;
  }
  .file-icon { font-size: 22px; }
  .file-info .file-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .file-info .file-size  { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }
  .img-bubble img {
    max-width: 260px; max-height: 200px;
    border-radius: 10px; display: block;
    cursor: pointer;
  }

  /* ── INPUT BAR ── */
  .input-bar {
    flex-shrink: 0;
    padding: 14px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .input-wrap {
    flex: 1; position: relative;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow);
  }
  .msg-input {
    width: 100%;
    background: transparent;
    border: none;
    padding: 12px 50px 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--sans);
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
  }
  .msg-input::placeholder { color: var(--text-dim); }
  .attach-btn {
    position: absolute; right: 12px; bottom: 10px;
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 18px; padding: 2px; transition: color .2s;
  }
  .attach-btn:hover { color: var(--red-bright); }
  #file-input { display: none; }
  .send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--red);
    border: none; border-radius: 10px;
    color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s;
  }
  .send-btn:hover  { background: var(--red-bright); }
  .send-btn:active { transform: scale(.93); }
  .file-preview {
    margin: 0 20px 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-family: var(--mono);
  }
  .file-preview-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-preview-rm   { background: none; border: none; color: var(--red-bright); cursor: pointer; font-size: 16px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--text-dim);
    font-family: var(--mono); font-size: 13px;
    text-align: center;
  }
  .empty-state .big { font-size: 48px; margin-bottom: 6px; }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.9);
    display: none; align-items: center; justify-content: center;
    z-index: 999; cursor: pointer;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg3); border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 8px; padding: 10px 16px;
    font-size: 13px; font-family: var(--mono);
    color: var(--text); max-width: 280px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo-mark">💬</div>
    <h1>LocalChat</h1>
    <p>// chat · réseau local · hors-ligne</p>
    <div class="input-group">
      <input type="text" id="pseudo-input" placeholder="Entrez votre pseudonyme…" maxlength="20" autocomplete="off">
    </div>
    <button class="btn-primary" onclick="joinChat()">Rejoindre le chat</button>
    <div class="login-error" id="login-error"></div>
    <div class="network-badge"><span class="dot-green"></span> Réseau local · Offline</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">LocalChat<span>// local network</span></div>
    <div class="topbar-right">
      <label class="toggle-container">
        <span>MODE EN LIGNE</span>
        <div class="switch">
          <input type="checkbox" id="online-toggle" checked onchange="toggleAppStatus()">
          <span class="slider"></span>
        </div>
      </label>
      <div class="my-pseudo">Connecté en tant que <strong id="my-pseudo-label">—</strong></div>
      <div class="status-pill"><span class="pulse"></span><span id="online-count">0</span> en ligne</div>
    </div>
  </div>

  <div class="main-area">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Salon</div>
        <div class="room-item active" id="room-general" onclick="switchToGeneral()">
          <span class="room-icon">📢</span> Général
        </div>
      </div>
      <div class="divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Utilisateurs en ligne</div>
      </div>
      <div class="users-list" id="users-list"></div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div class="chat-header">
        <span id="chat-header-icon">📢</span>
        <span class="chat-header-name" id="chat-header-name">Général</span>
        <span class="chat-header-sub" id="chat-header-sub">salon public</span>
      </div>

      <div class="messages-container" id="messages-container">
        <div class="empty-state" id="empty-state">
          <div class="big">💬</div>
          <div>Aucun message pour l'instant.</div>
          <div>Soyez le premier à écrire !</div>
        </div>
      </div>

      <div class="file-preview" id="file-preview" style="display:none">
        <span>📎</span>
        <span class="file-preview-name" id="file-preview-name"></span>
        <button class="file-preview-rm" onclick="removeFile()">✕</button>
      </div>

      <div class="input-bar">
        <div class="input-wrap">
          <textarea class="msg-input" id="msg-input" rows="1"
            placeholder="Écrire un message…"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"></textarea>
          <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Joindre un fichier">📎</button>
          <input type="file" id="file-input" onchange="previewFile(this)">
        </div>
        <button class="send-btn" onclick="sendMessage()" title="Envoyer">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<script>
const API = 'api/index.php';
let myToken = null, myPseudo = null, myId = null, myColor = null;
let currentTarget = null; // null = general, int = user_id
let currentTargetPseudo = '';
let lastTs = 0;
let onlineUsers = {};
let unreadMap = {};
let pollInterval = null;
let pingInterval = null;
let isAppOnline = true;
let selectedFile = null;

/* ══ LOGIN ══ */
async function joinChat() {
  const pseudo = document.getElementById('pseudo-input').value.trim();
  const errEl  = document.getElementById('login-error');
  errEl.textContent = '';
  if (!pseudo) { errEl.textContent = 'Entrez un pseudonyme.'; return; }

  try {
    const fd = new FormData();
    fd.append('action', 'join');
    fd.append('pseudo', pseudo);
    const res  = await fetch(API, { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error || 'Erreur'; return; }

    myToken  = data.token;
    myPseudo = data.pseudo;
    myId     = data.id;
    myColor  = data.color;

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    document.getElementById('my-pseudo-label').textContent = myPseudo;

    startPolling();
  } catch(e) {
    errEl.textContent = 'Impossible de joindre le serveur. Vérifiez votre connexion au réseau local.';
  }
}

document.getElementById('pseudo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinChat();
});

/* ══ POLLING ══ */
function startPolling() {
  lastTs = 0;
  poll();
  pollInterval = setInterval(poll, 2000);
  pingInterval = setInterval(ping, 15000);
  fetchOnline();
  setInterval(fetchOnline, 5000);
}

function toggleAppStatus() {
  isAppOnline = document.getElementById('online-toggle').checked;
  const statusDot = document.querySelector('.pulse');
  if (!isAppOnline) {
    statusDot.style.background = '#e74c3c';
    statusDot.style.animation = 'none';
  } else {
    statusDot.style.background = '#2ecc71';
    statusDot.style.animation = 'pulse 2s infinite';
    poll(); // Relancer immédiatement une mise à jour
  }
}

async function ping() {
  if (!isAppOnline) return;
  try { await fetch(`${API}?action=ping&token=${myToken}`); } catch(e) {}
}

async function fetchOnline() {
  if (!isAppOnline) return;
  try {
    const res  = await fetch(`${API}?action=online&token=${myToken}`);
    const data = await res.json();
    if (!data.ok) return;
    renderOnlineUsers(data.users);
    document.getElementById('online-count').textContent = data.users.length;
  } catch(e) {}
}

async function poll() {
  if (!isAppOnline) return;
  try {
    let url = `${API}?action=messages&token=${myToken}&since=${lastTs}`;
    if (currentTarget) url += `&receiver_id=${currentTarget}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.ok) return;
    if (data.messages.length) {
      renderMessages(data.messages);
      lastTs = data.server_time;
    }
  } catch(e) {}
}

/* ══ ONLINE USERS ══ */
function renderOnlineUsers(users) {
  const list = document.getElementById('users-list');
  const prevOnline = { ...onlineUsers };
  onlineUsers = {};
  users.forEach(u => onlineUsers[u.id] = u);

  // Detect new joins
  users.forEach(u => {
    if (!prevOnline[u.id] && u.id !== myId && Object.keys(prevOnline).length > 0)
      toast(`${u.pseudo} a rejoint le chat`);
  });

  list.innerHTML = '';
  users.forEach(u => {
    const isMe = u.id == myId;
    const isActive = currentTarget == u.id;
    const badge = unreadMap[u.id] ? `<span class="unread-badge">${unreadMap[u.id]}</span>` : '';
    const div = document.createElement('div');
    div.className = `user-item ${isMe ? 'me' : ''} ${isActive ? 'active' : ''}`;
    div.dataset.uid = u.id;
    div.innerHTML = `
      <div class="avatar" style="background:${u.avatar_color}">${u.pseudo[0]}</div>
      <div style="display:flex;flex-direction:column">
        <span>${u.pseudo}${isMe ? ' <small style="color:var(--text-dim)">(moi)</small>' : ''}</span>
        <small style="font-size:9px;color:var(--text-dim);font-family:var(--mono)">${u.ip_address || 'IP inconnue'}</small>
      </div>
      ${badge}`;
    if (!isMe) div.onclick = () => switchToPrivate(u.id, u.pseudo, u.avatar_color);
    list.appendChild(div);
  });
}

/* ══ SWITCH CHANNELS ══ */
function switchToGeneral() {
  currentTarget = null;
  currentTargetPseudo = '';
  lastTs = 0;
  clearMessages();
  document.getElementById('chat-header-icon').textContent = '📢';
  document.getElementById('chat-header-name').textContent = 'Général';
  document.getElementById('chat-header-sub').textContent  = 'salon public';
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  document.getElementById('room-general').classList.add('active');
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  poll();
}

function switchToPrivate(uid, pseudo, color) {
  currentTarget = uid;
  currentTargetPseudo = pseudo;
  lastTs = 0;
  clearMessages();
  document.getElementById('chat-header-icon').innerHTML = `<span class="avatar" style="background:${color};width:28px;height:28px;font-size:12px">${pseudo[0]}</span>`;
  document.getElementById('chat-header-name').textContent = pseudo;
  document.getElementById('chat-header-sub').textContent  = 'message privé';
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.user-item[data-uid="${uid}"]`);
  if (el) el.classList.add('active');
  if (unreadMap[uid]) { delete unreadMap[uid]; renderOnlineUsers(Object.values(onlineUsers)); }
  poll();
}

function clearMessages() {
  const c = document.getElementById('messages-container');
  c.innerHTML = '<div class="empty-state" id="empty-state"><div class="big">💬</div><div>Aucun message pour l\'instant.</div></div>';
}

/* ══ RENDER MESSAGES ══ */
let renderedIds = new Set();
function renderMessages(msgs) {
  const container = document.getElementById('messages-container');
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  msgs.forEach(m => {
    if (renderedIds.has(m.id)) return;
    renderedIds.add(m.id);

    // Track unread if private and not current
    if (m.receiver_id && m.sender_id != myId && m.sender_id != currentTarget) {
      unreadMap[m.sender_id] = (unreadMap[m.sender_id] || 0) + 1;
    }

    const isMine = m.sender_id == myId;
    const group = document.createElement('div');
    group.className = 'msg-group';

    const ts = new Date(m.created_at * 1000).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    const meta = `<div class="msg-meta"><span class="msg-sender" style="color:${m.sender_color}">${m.sender_pseudo}</span><span class="msg-time">${ts}</span></div>`;

    let bubbleHtml = '';
    if (m.type === 'file') {
      const isImg = m.file_type && m.file_type.startsWith('image/');
      if (isImg) {
        bubbleHtml = `<div class="bubble ${isMine ? 'mine' : ''}"><div class="img-bubble"><img src="${m.file_path}" alt="${m.file_name}" onclick="openLightbox('${m.file_path}')"></div></div>`;
      } else {
        const icon = fileIcon(m.file_type);
        bubbleHtml = `<div class="bubble ${isMine ? 'mine' : ''}"><a class="file-bubble" href="${m.file_path}" download="${m.file_name}" target="_blank"><span class="file-icon">${icon}</span><div class="file-info"><div class="file-label">${m.file_name}</div><div class="file-size">Télécharger</div></div></a></div>`;
      }
    } else {
      bubbleHtml = `<div class="bubble ${isMine ? 'mine' : ''}">${m.content}</div>`;
    }

    const avatarHtml = `<div class="avatar-wrap"><div class="avatar" style="background:${m.sender_color}">${m.sender_pseudo[0]}</div></div>`;
    group.innerHTML = meta + `<div class="msg-row ${isMine ? 'mine' : ''}">${isMine ? '' : avatarHtml}${bubbleHtml}${isMine ? avatarHtml : ''}</div>`;
    container.appendChild(group);
  });

  container.scrollTop = container.scrollHeight;
}

function fileIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('video/'))       return '🎬';
  if (mime.startsWith('audio/'))       return '🎵';
  if (mime.includes('pdf'))            return '📕';
  if (mime.includes('zip') || mime.includes('x-rar')) return '📦';
  return '📄';
}

/* ══ SEND ══ */
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content && !selectedFile) return;

  const fd = new FormData();
  fd.append('action', 'send');
  if (content) fd.append('content', content);
  if (currentTarget) fd.append('receiver_id', currentTarget);
  if (selectedFile) fd.append('file', selectedFile);

  input.value = '';
  autoResize(input);
  removeFile();

  try {
    const res  = await fetch(API, { method: 'POST', headers: { 'X-Token': myToken }, body: fd });
    const data = await res.json();
    if (data.ok) poll();
    else toast('Erreur : ' + (data.error || 'inconnue'), true);
  } catch(e) {
    toast('Échec de l\'envoi. Vérifiez le réseau.', true);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

/* ══ FILE ══ */
function previewFile(input) {
  if (!input.files[0]) return;
  selectedFile = input.files[0];
  document.getElementById('file-preview').style.display = 'flex';
  document.getElementById('file-preview-name').textContent = selectedFile.name;
}
function removeFile() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-preview').style.display = 'none';
}

/* ══ LIGHTBOX ══ */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ══ TOAST ══ */
function toast(msg, isErr = false) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  if (isErr) t.style.borderLeftColor = '#e74c3c';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
