<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LocalChat — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a; --bg2: #222; --bg3: #2a2a2a;
    --red: #c0392b; --red-bright: #e74c3c;
    --text: #e8e8e8; --text-muted: #888;
    --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 40px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 32px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
  h1 span { color: var(--red); font-family: var(--mono); font-size: 14px; border: 1px solid var(--red); padding: 4px 10px; border-radius: 4px; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--bg2); border: 1px solid #333; padding: 25px; border-radius: 12px; text-align: center; }
  .stat-card .val { display: block; font-size: 36px; font-weight: 800; color: var(--red-bright); margin-bottom: 5px; }
  .stat-card .label { font-family: var(--mono); font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

  .recent-list { background: var(--bg2); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
  .list-header { padding: 15px 20px; background: var(--bg3); border-bottom: 1px solid #333; font-weight: 700; display: flex; justify-content: space-between; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 20px; border-bottom: 1px solid #333; font-size: 14px; }
  th { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .avatar-sm { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-right: 10px; }
</style>
</head>
<body>

<div class="container">
  <h1>LocalChat <span>ADMIN PANEL</span></h1>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="val" id="stat-online">0</span>
      <span class="label">En ligne</span>
    </div>
    <div class="stat-card">
      <span class="val" id="stat-users">0</span>
      <span class="label">Utilisateurs Total</span>
    </div>
    <div class="stat-card">
      <span class="val" id="stat-messages">0</span>
      <span class="label">Messages échangés</span>
    </div>
  </div>

  <div class="recent-list">
    <div class="list-header">
      Dernières activités
      <button onclick="loadStats()" style="background:none; border:none; color:var(--red); cursor:pointer; font-family:var(--mono); font-size:11px;">[ ACTUALISER ]</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Utilisateur</th>
          <th>Adresse IP</th>
          <th>Dernière vue</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody id="user-table">
        <!-- Rempli via JS -->
      </tbody>
    </table>
  </div>
</div>

<script>
  // On pointe vers le fichier API spécifique à l'admin
  const API = 'api/admin_stats.php';

  async function loadStats() {
    try {
      const res = await fetch(API);
      const data = await res.json();
      if (!data.ok) return;

      // Mise à jour des compteurs
      document.getElementById('stat-online').textContent = data.stats.online_users;
      document.getElementById('stat-users').textContent = data.stats.total_users;
      document.getElementById('stat-messages').textContent = data.stats.total_messages;

      // Mise à jour du tableau
      const tbody = document.getElementById('user-table');
      tbody.innerHTML = '';

      const now = Math.floor(Date.now() / 1000);

      data.recent_users.forEach(u => {
        const isOnline = (now - u.last_seen) < 30;
        const dateStr = new Date(u.last_seen * 1000).toLocaleString('fr-FR');
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <span class="avatar-sm" style="background:${u.avatar_color}">${u.pseudo[0].toUpperCase()}</span>
            <strong>${u.pseudo}</strong>
          </td>
          <td style="font-family:var(--mono); font-size:12px; color:var(--text-muted)">${u.ip_address || '—'}</td>
          <td style="font-size:12px">${dateStr}</td>
          <td>
            <span class="status-dot" style="background:${isOnline ? '#2ecc71' : '#555'}"></span>
            <small style="font-family:var(--mono); font-size:10px">${isOnline ? 'ONLINE' : 'OFFLINE'}</small>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch(e) {
      console.error("Erreur lors du chargement des stats", e);
    }
  }

  // Chargement initial et rafraîchissement automatique
  loadStats();
  setInterval(loadStats, 5000); 
</script>

</body>
</html>
